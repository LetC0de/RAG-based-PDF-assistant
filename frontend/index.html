<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain-overlay"></div>

    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <span class="logo-icon">◆</span>
                    <span class="logo-text">Document Intelligence</span>
                </h1>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Ready</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="upload-section" id="uploadSection">
                <div class="upload-card">
                    <div class="upload-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h2 class="upload-title">Upload Your Document</h2>
                    <p class="upload-description">Start by uploading a PDF to analyze and query</p>

                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput" accept=".pdf" class="file-input">
                        <label for="fileInput" class="file-label" id="fileLabel">
                            <span class="file-label-text">Choose PDF File</span>
                        </label>
                    </div>

                    <div class="selected-file" id="selectedFile" style="display: none;">
                        <div class="file-info">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                            <span class="file-name" id="fileName"></span>
                        </div>
                        <button class="remove-file" id="removeFile">×</button>
                    </div>

                    <button class="upload-button" id="uploadButton" disabled>
                        <span class="button-text">Process Document</span>
                        <span class="button-arrow">→</span>
                    </button>

                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <p class="progress-text" id="progressText">Processing...</p>
                    </div>
                </div>

                <div class="current-document" id="currentDocument" style="display: none;">
                    <div class="document-badge">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <span id="currentDocName">document.pdf</span>
                    </div>
                </div>
            </div>

            <div class="chat-section" id="chatSection" style="display: none;">
                <div class="chat-header">
                    <div class="chat-title-group">
                        <h2 class="chat-title">Conversation</h2>
                        <div class="document-indicator" id="chatDocIndicator">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                <polyline points="13 2 13 9 20 9"></polyline>
                            </svg>
                            <span id="chatDocName">document.pdf</span>
                        </div>
                    </div>
                    <button class="clear-chat-button" id="clearChatButton">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear Chat
                    </button>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message">
                        <div class="welcome-icon">◆</div>
                        <p>Ask me anything about your document. I'll search through the content and provide accurate answers based on what I find.</p>
                    </div>
                </div>

                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea
                            id="chatInput"
                            class="chat-input"
                            placeholder="Ask a question about your document..."
                            rows="1"
                        ></textarea>
                        <button class="send-button" id="sendButton" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
